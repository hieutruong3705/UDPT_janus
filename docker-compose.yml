services:
  user-service:
    build: ./user-service
    ports:
      - "9001:9001"
    environment:
      - REGISTRY_URL=http://janus-gateway:8880/api/register
      - SERVICE_HOST=user-service
      - SERVICE_PORT=9001

  product-service-1:
    build: ./product-service
    ports:
      - "9002:9002"
    environment:
      - REGISTRY_URL=http://janus-gateway:8880/api/register
      - SERVICE_HOST=product-service-1
      - SERVICE_PORT=9002

  product-service-2:
    build: ./product-service
    ports:
      - "9022:9002"
    environment:
      - REGISTRY_URL=http://janus-gateway:8880/api/register
      - SERVICE_HOST=product-service-2
      - SERVICE_PORT=9002

  order-service-1:
    build: ./order-service
    ports:
      - "9003:9003"
    environment:
      - REGISTRY_URL=http://janus-gateway:8880/api/register
      - SERVICE_HOST=order-service-1
      - SERVICE_PORT=9003

  order-service-2:
    build: ./order-service
    ports:
      - "9033:9003"
    environment:
      - REGISTRY_URL=http://janus-gateway:8880/api/register
      - SERVICE_HOST=order-service-2
      - SERVICE_PORT=9003

  janus-gateway:
    build: ./janus
    ports:
      - "8888:8080"
      - "8880:8880"
    volumes:
      - ./janus-config:/etc/janus
    depends_on:
      - user-service
      - product-service-1
      - product-service-2
      - order-service-1
      - order-service-2
